<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Haven — 数据编辑器 v2</title>
<style>
:root{--bg:#0a0e14;--panel:#131820;--border:#1e2a3a;--text:#c8d6e5;--dim:#5c7a9a;--accent:#39c0d4;--warn:#e6a23c;--danger:#e0555a;--success:#4ecb71}
*{margin:0;padding:0;box-sizing:border-box;max-width:100%}
html,body{width:100%;max-width:100vw;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:"Segoe UI","Microsoft YaHei",sans-serif;height:100vh;display:flex;flex-direction:column;min-width:0}
#header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--border);min-width:0}
#header h1{font-size:16px;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#status-msg{font-size:11px;color:var(--dim);flex:1;text-align:center;margin:0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
#header .btns{display:flex;gap:6px}
.btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:var(--panel);color:var(--text);font-size:12px;cursor:pointer;font-family:inherit}
.btn:hover{background:#1e2d40;border-color:var(--accent)}
.btn.save{background:var(--success);color:var(--bg);border-color:var(--success);font-weight:bold}
.btn.export{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.btn.danger{color:var(--danger);border-color:var(--danger)}
.btn-sm{padding:2px 8px;font-size:10px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--dim);cursor:pointer}
.btn-sm:hover{color:var(--text);border-color:var(--text)}
.btn-sm.green{color:var(--success);border-color:var(--success)}
#tabs{display:flex;background:var(--panel);border-bottom:1px solid var(--border);overflow-x:auto;padding:0 4px}
.tab{padding:8px 14px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:var(--dim);white-space:nowrap}
.tab:hover{color:var(--text)}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
#main{display:flex;flex:1;overflow:hidden}
#list-panel{width:220px;min-width:140px;max-width:260px;border-right:1px solid var(--border);overflow-y:auto;overflow-x:hidden;padding:4px;transition:width 0.2s;flex-shrink:3}
#list-panel.collapsed{width:0;min-width:0;padding:0;overflow:hidden;border-right:none}
#edit-panel{flex:3;min-width:0;overflow-y:auto;overflow-x:hidden;padding:12px 14px;word-break:break-word}
#collapse-btn{position:absolute;left:218px;top:50%;z-index:10;width:18px;height:40px;background:var(--panel);border:1px solid var(--border);border-left:none;border-radius:0 4px 4px 0;color:var(--dim);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;transition:left 0.2s}
#collapse-btn.collapsed{left:0}
#main-wrap{position:relative;display:flex;flex:1;overflow:hidden}
.cat-header{display:flex;align-items:center;justify-content:space-between;padding:3px 6px;font-size:11px;color:var(--accent);cursor:pointer;margin-top:2px;border-radius:4px}
.cat-header:hover{background:#1a2635}.cat-header .ct-name{font-weight:bold;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-header .ct-actions{display:flex;gap:2px;opacity:0;transition:opacity 0.15s}
.cat-header:hover .ct-actions{opacity:1}
.cat-items{padding-left:8px}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:4px 6px;font-size:11px;cursor:pointer;border-radius:4px;margin:1px 0}
.list-item:hover{background:#1a2635}.list-item.sel{background:#1e3550;border-left:3px solid var(--accent)}
.list-item .li-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-item .li-meta{font-size:9px;color:var(--dim);margin-left:6px;flex-shrink:0}
.field{margin-bottom:8px;min-width:0}
.field label{display:block;font-size:10px;color:var(--dim);margin-bottom:2px}
.field input,.field select,.field textarea{width:100%;padding:5px 6px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;font-family:inherit}
.field textarea{resize:vertical;min-height:50px}.field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
.field-row{display:flex;gap:6px;flex-wrap:wrap}
.field-row .field{flex:1;min-width:85px}
.field-row .field.wide{flex:2;min-width:120px}
.section-title{font-size:13px;color:var(--accent);font-weight:bold;margin:16px 0 8px;border-bottom:1px solid var(--border);padding-bottom:4px}
.kv-row{display:flex;gap:4px;align-items:center;margin-bottom:4px;font-size:12px;min-width:0}
.kv-row select{flex:1 1 80px;min-width:60px;max-width:280px;padding:4px 6px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;overflow:hidden;text-overflow:ellipsis}
.kv-row input{flex:1;min-width:0;max-width:100%;padding:4px 6px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px}
.kv-row input[type=number]{flex:0 1 55px;min-width:36px}
.kv-row .kv-remove{color:var(--danger);cursor:pointer;font-size:14px;padding:2px 4px;flex:none}
select{max-width:100%;overflow:hidden;text-overflow:ellipsis}
.empty-hint{text-align:center;color:var(--dim);padding:40px;font-size:13px}
.lv-block{border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px;background:var(--bg)}
.lv-block .lv-title{font-weight:bold;margin-bottom:6px;color:var(--accent)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1e2a3a;border-radius:2px}

@media(max-width:700px){
  .tab{padding:6px 8px;font-size:10px}
  #header{flex-wrap:wrap;gap:4px;padding:6px}
  #header h1{font-size:13px}
  #header .btns{gap:4px}
  .btn{padding:4px 8px;font-size:10px}
  #list-panel{width:160px;min-width:120px;font-size:10px}
  #edit-panel{padding:8px 10px}
  .field-row{flex-direction:column;gap:4px}
  .field-row .field{min-width:0}
  .field{margin-bottom:6px}
  .field input,.field select,.field textarea{font-size:11px;padding:4px 5px}
  .section-title{font-size:11px;margin:10px 0 6px}
  #status-msg{font-size:9px;margin:0 4px}
  .list-item{font-size:10px;padding:3px 5px}
  .kv-row{font-size:10px}
}
@media(max-width:500px){
  #list-panel{position:absolute;left:0;top:0;bottom:0;z-index:5;width:220px}
  #list-panel.collapsed{width:0}
  #edit-panel{min-width:0;padding:8px}
  #collapse-btn{display:flex}
}
@media(min-width:501px){
  #collapse-btn{display:none}
}
</style>
</head>
<body>
<div id="header"><h1>🌊 Deep Haven 编辑器 v2</h1><span id="status-msg">✅ 就绪</span><div class="btns"><button class="btn save" onclick="saveAll()">💾 全部保存</button><button class="btn export" onclick="exportAll()">📥 导出 JSON</button></div></div>
<div id="tabs">
<div class="tab active" data-tab="items">📦 物品</div>
<div class="tab" data-tab="recipes">🔨 配方</div>
<div class="tab" data-tab="facilities">🏗️ 设施</div>
<div class="tab" data-tab="locations">🗺️ 地点</div>
<div class="tab" data-tab="disasters">🌪️ 天灾</div>
<div class="tab" data-tab="events">📜 事件</div>
<div class="tab" data-tab="system">⚙️ 系统</div>
</div>
<div id="main-wrap"><div id="collapse-btn" onclick="toggleList()" style="display:none">◀</div>
<div id="main"><div id="list-panel"></div><div id="edit-panel"><div class="empty-hint">← 选择条目编辑</div></div></div>
</div>
<script src="editor.js"></script>
</body>
</html>
